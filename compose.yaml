services:
  app:
    build: .
    container_name: toga-racing-v2
    ports:
      - "8083:8000"
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8083
      LOG_CHANNEL: stderr
      INSTAGRAM_USER_ID: ${INSTAGRAM_USER_ID:-}
      INSTAGRAM_ACCESS_TOKEN: ${INSTAGRAM_ACCESS_TOKEN:-}
      INSTAGRAM_PROFILE_URL: ${INSTAGRAM_PROFILE_URL:-https://www.instagram.com/toga_racing/}
      ENQUIRY_NOTIFICATION_EMAIL: ${ENQUIRY_NOTIFICATION_EMAIL:-}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      DISCORD_PARTNER_CHANNEL_ID: ${DISCORD_PARTNER_CHANNEL_ID:-1527599240405323887}
      DISCORD_DRIVER_CHANNEL_ID: ${DISCORD_DRIVER_CHANNEL_ID:-1527599269392023633}
    restart: unless-stopped
